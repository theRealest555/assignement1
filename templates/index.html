<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <script>
        function runEmotionDetection() {
            let textToAnalyze = document.getElementById("textToAnalyze").value;
            let xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function() {
                if (this.readyState == 4 && this.status == 200) {
                    document.getElementById("system_response").innerHTML = xhttp.responseText;
                }
            };
            xhttp.open("GET", "emotionDetector?textToAnalyze=" + encodeURIComponent(textToAnalyze), true);
            xhttp.send();
        }
    </script>
</head>
<body>
    <h2>Emotion Detector</h2>
    <div>
        <label for="textToAnalyze">Enter text to analyze:</label><br><br>
        <textarea id="textToAnalyze" rows="4" cols="50"></textarea><br><br>
        <button onclick="runEmotionDetection()">Run Emotion Detection</button>
    </div>
    <br>
    <div id="system_response"></div>
</body>
</html>
